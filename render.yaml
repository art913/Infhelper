# Подключите репозиторий GitHub в панели Render: New → Blueprint → этот файл.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: infhelper
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
